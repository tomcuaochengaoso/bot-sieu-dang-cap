        vietnamese_name_pattern: "Dùng bot \"{bot_name}\" trong kênh \"{channel_name}\""
        event_type: "channel_bot_interaction"
        raw_discord_event: "message_sent (bot, untracked bot ID)"
        note: >
          Fires for bot messages from bots NOT in TRACKED_BOTS config,
          when channel is a text channel. Tracked bots have their own
          dedicated event paths above.
        required_properties:
          <<: *base_user
          <<: *base_channel
          <<: *vietnamese_event_meta
        optional_properties:
          - name: bot_name
            type: string
          - name: bot_id
            type: string


  # ----------------------------------------------------------
  # LUỒNG 11: Vào mục "{forum_name}"  [DYNAMIC]
  # Luồng name is dynamically constructed from the forum channel name.
  # Only fires for forums in tracked category IDs:
  #   1094265617823047804, 1092298134639620199,
  #   1112913932030574612, 1113493487258718369
  # Non-forum threads are silently dropped (return []).
  # ----------------------------------------------------------
  luong_forum_dynamic:
    luong_name_pattern: "Vào mục \"{forum_name}\""
    note: >
      forum_name = the parent forum channel's name.
      Only events where parent_channel_type contains "forum" are tracked.
      The luong and vietnamese_name are both dynamic strings.

    events:

      forum_thread_create:
        vietnamese_name_pattern: "Đăng bài trong \"{forum_name}\""
        event_type: "forum_thread_create"
        raw_discord_event: "thread_created"
        trigger_condition: >
          on_thread_create fires with parent_channel_type = "forum" or
          "guild_forum". Non-forum parents are silently ignored.
        required_properties:
          <<: *base_user
          <<: *base_channel
          <<: *vietnamese_event_meta
          - name: forum_name
            type: string
          - name: thread_id
            type: string        # snowflake string
          - name: interaction_type
            type: string        # "thread_create"
        optional_properties:
          - name: parent_channel_type
            type: string
          - name: category_id
            type: string
          - name: category_name
            type: string

      forum_thread_delete:
        vietnamese_name_pattern: "Xoá bài trong \"{forum_name}\""
        event_type: "forum_thread_delete"
        raw_discord_event: "thread_deleted"
        trigger_condition: >
          on_thread_delete with parent_channel_type = forum only.
        required_properties:
          <<: *base_user
          <<: *base_channel
          <<: *vietnamese_event_meta
          - name: forum_name
            type: string
          - name: thread_id
            type: string
          - name: interaction_type
            type: string        # "thread_delete"
        optional_properties:
          - name: parent_channel_type
            type: string
          - name: category_id
            type: string
          - name: category_name
            type: string

      forum_thread_follow:
        vietnamese_name_pattern: "Theo dõi bài trong \"{forum_name}\""
        event_type: "forum_thread_follow"
        raw_discord_event: "thread_followed"
        trigger_condition: >
          on_thread_member_join (non-bot user, non-bot-itself).
          Only when parent_channel_type is forum.
        required_properties:
          <<: *base_user
          <<: *base_channel
          <<: *vietnamese_event_meta
          - name: forum_name
            type: string
          - name: thread_id
            type: string
          - name: parent_channel_type
            type: string
          - name: interaction_type
            type: string        # "thread_follow"
        optional_properties:
          - name: thread_name
            type: string
          - name: parent_channel_id
            type: string
          - name: joined_at
            type: string        # ISO 8601
          - name: parent_category_id
            type: string
          - name: parent_category_name
            type: string

      forum_message_in_thread:
        vietnamese_name_pattern: "Thảo luận về bài viết trong \"{forum_name}\""
        event_type: "channel_message_in_thread"
        raw_discord_event: "message_sent (user, thread_id set, parent is forum)"
        trigger_condition: >
          User sends message inside a forum thread.
          channel_name uses parent_channel_name (the forum name), not the thread name.
        required_properties:
          <<: *base_user
          <<: *base_channel
          <<: *base_message
          <<: *vietnamese_event_meta
        optional_properties:
          - name: thread_id
            type: string
          - name: parent_channel_id
            type: string
          - name: parent_channel_name
            type: string        # = forum_name
          - name: parent_channel_type
            type: string
          - name: parent_category_id
            type: string
          - name: parent_category_name
            type: string

      forum_delete_message_in_thread:
        vietnamese_name_pattern: "Xoá tin nhắn về bài viết trong \"{forum_name}\""
        event_type: "channel_delete_message_in_thread"
        raw_discord_event: "message_deleted (user, thread_id set, parent is forum)"
        required_properties:
          <<: *base_user
          <<: *base_channel
          <<: *vietnamese_event_meta
        optional_properties:
          - name: thread_id
            type: string
          - name: parent_channel_name
            type: string
          - name: parent_category_id
            type: string

      forum_edit_message_in_thread:
        vietnamese_name_pattern: "Sửa tin nhắn về bài viết trong \"{forum_name}\""
        event_type: "channel_edit_message_in_thread"
        raw_discord_event: "message_edited (user, thread_id set, parent is forum)"
        required_properties:
          <<: *base_user
          <<: *base_channel
          <<: *vietnamese_event_meta
        optional_properties:
          - name: thread_id
            type: string
          - name: parent_channel_name
            type: string
          - name: edit_timestamp
            type: string

      forum_react_to_thread:
        vietnamese_name_pattern: "React về bài viết trong \"{forum_name}\""
        event_type: "channel_react_to_thread"
        raw_discord_event: "reaction_added (thread_reaction_added path)"
        required_properties:
          <<: *base_user
          <<: *base_channel
          <<: *vietnamese_event_meta
        optional_properties:
          - name: parent_channel_type
            type: string
          - name: parent_category_id
            type: string
          - name: parent_category_name
            type: string
          - name: emoji_id
            type: string
          - name: emoji_name
            type: string

      forum_react_to_message:
        vietnamese_name_pattern: "React tin nhắn trong \"{forum_name}\" forum"
        event_type: "channel_react_to_message_in_thread"
        raw_discord_event: "reaction_added (message inside forum thread)"
        required_properties:
          <<: *base_user
          <<: *base_channel
          <<: *vietnamese_event_meta
        optional_properties:
          - name: parent_channel_type
            type: string
          - name: parent_category_id
            type: string
          - name: parent_category_name
            type: string
          - name: emoji_id
            type: string
          - name: emoji_name
            type: string
          - name: emoji_unicode
            type: string

      forum_sticker_in_thread:
        vietnamese_name_pattern: "Gửi sticker trong \"{forum_name}\""
        event_type: "channel_sticker_in_thread"
        raw_discord_event: "sticker_sent (inside forum thread)"
        required_properties:
          <<: *base_user
          <<: *base_channel
          <<: *vietnamese_event_meta
        optional_properties:
          - name: parent_channel_type
            type: string
          - name: parent_category_id
            type: string
          - name: parent_category_name
            type: string
          - name: sticker_ids
            type: array[string]


# ============================================================
# UNHANDLED DISCORD EVENTS (fall to generic fallback)
# These events have no specific handler in EventIdentifier.
# They produce: vietnamese_name="UNIDENTIFIED_EVENT: {type}"
#               luong="Vào các kênh chat", is_unidentified=true
# ============================================================
unhandled_events:
  - raw_event: "user_interested_in_event"
    source: "on_scheduled_event_user_add"
    payload: [event_id, event_name, event_start_time]
    status: "NO_HANDLER — falls to generic fallback"

  - raw_event: "user_not_interested_in_event"
    source: "on_scheduled_event_user_remove"
    payload: [event_id, event_name]
    status: "NO_HANDLER — falls to generic fallback"

  - raw_event: "invite_created"
    source: "on_invite_create"
    payload: [invite_code, invite_url, max_uses, temporary]
    status: "NO_HANDLER — falls to generic fallback"

  - raw_event: "user_joined_server"
    source: "on_member_join"
    payload: [join_timestamp, joining_user_id]
    status: "NO_HANDLER — falls to generic fallback"

  - raw_event: "user_left_server"
    source: "on_member_remove"
    payload: [leaving_user_id]
    status: "NO_HANDLER — falls to generic fallback"

  - raw_event: "channel_created"
    source: "on_guild_channel_create"
    payload: [channel_type, parent_category_id, created_channel_id]
    status: "NO_HANDLER — falls to generic fallback"

  - raw_event: "channel_deleted"
    source: "on_guild_channel_delete"
    payload: [channel_type, deleted_channel_id]
    status: "NO_HANDLER — falls to generic fallback"

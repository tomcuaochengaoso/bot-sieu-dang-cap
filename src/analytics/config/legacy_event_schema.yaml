  # ----------------------------------------------------------
  # LUỒNG 10: Vào các kênh chat  (text channels)
  # ----------------------------------------------------------
  luong_text_chat:
    luong_name: "Vào các kênh chat"

    events:

      text_channel_message:
        vietnamese_name_pattern: "Nhắn trong kênh \"{channel_name}\""
        event_type: "channel_message"
        raw_discord_event: "message_sent"
        required_properties:
          <<: *base_user
          <<: *base_channel
          <<: *base_message
          <<: *vietnamese_event_meta
        optional_properties:
          - name: category_id
            type: string
          - name: category_name
            type: string

      text_channel_delete_message:
        vietnamese_name_pattern: "Xoá tin nhắn trong kênh \"{channel_name}\""
        event_type: "channel_delete_message"
        raw_discord_event: "message_deleted"
        required_properties:
          <<: *base_user
          <<: *base_channel
          <<: *vietnamese_event_meta
        optional_properties:
          - name: deleted_message_id
            type: string        # snowflake string

        event_type: "channel_reaction"
        raw_discord_event: "reaction_added OR reaction_removed"
        note: >
          reaction_removed maps to same "reaction" interaction_type as reaction_added
          in text channel EVENT_INTERACTION_MAPPINGS.
        required_properties:
          <<: *base_user
          <<: *base_channel
          <<: *vietnamese_event_meta
        optional_properties:
          - name: emoji_id
            type: string        # snowflake string (custom emoji)
          - name: emoji_name
            type: string
          - name: emoji_unicode
            type: string        # standard unicode emoji
          - name: category_id
            type: string
          - name: category_name

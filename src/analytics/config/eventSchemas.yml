validation:
  "User ID":
    type: string
    required: true
  discord_name:
    type: string
    required: true
  server_name:
    type: string
    required: true
  distinct_id:
    type: string
    required: true
  channel_id:
    type: string
    required: true
  message_id:
    type: string
    required: true
  vietnamese_event_name:
    type: string
    required: true
    min_length: 1
  luong:
    type: string
    required: true
  event_type:
    type: string
    required: true
  "$time":
    type: string
    required: true
  "$insert_id":
    type: string
    required: true
  timestamp:
    type: string
    required: true
  correlation_confidence:
    type: number
    min: 0
    max: 1
  is_trackable:
    type: boolean
    default: true

luong_definitions:
  onboarding:
    value: "Onbroading server"
    description: "User onboarding journey events"
  general_chat:
    value: "Sử dụng tính năng chát chung"
    description: "General chat feature usage"
  announcement:
    value: "Xem loa phương"
    description: "Announcement channel follow events"
  game_gang:
    value: "Vào mục gêm gủng"
    description: "Gaming bot interactions"
  room_creation:
    value: "Vào mục Bấm để tạo room"
    description: "Voice room creation events"
  room_settings:
    value: "Vào mục cài-đặt-room"
    description: "Room settings bot usage"
  voice_fixed:
    value: "Vào các kênh voice cố định"
    description: "Permanent voice channel usage"
  voice_custom:
    value: "Vào các kênh voice tự tạo"
    description: "User-created voice channel usage"
  text_channels:
    value: "Vào các kênh chat"
    description: "General text/voice channel chat interactions"
  role_updates:
    value: "Vai trò ngườii dùng cập nhập"
    description: "Role assignment changes"
  forum_dynamic:
    value_pattern: "Vào mục \"{forum_name}\""
    description: "Forum-specific events (dynamic per forum)"


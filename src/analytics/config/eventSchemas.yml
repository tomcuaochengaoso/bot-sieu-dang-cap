  # LUỒNG 4: Vai trò ngườii dùng cập nhập
  role_added:
    name_pattern: "Đã thêm vai trò {role_name}"
    luong: "Vai trò ngườii dùng cập nhập"
    required_properties:
      - *base_user
      - *base_event
      - role_name
      - role_action
      - is_role_event
      - single_role_event
      - target_user_id

  role_removed:
    name_pattern: "Đã loại bỏ vai trò {role_name}"
    luong: "Vai trò ngườii dùng cập nhập"
    required_properties:
      - *base_user
      - *base_event
      - role_name
      - role_action
      - is_role_event
      - single_role_event
      - target_user_id

  # LUỒNG 5: Vào mục gêm gủng
  bot_marwuy_coin:
    name: "Chơi gêm marwuy coin"
    luong: "Vào mục gêm gủng"

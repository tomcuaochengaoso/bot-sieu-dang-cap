# Event Schema Configuration
# Single source of truth for event naming, validation, and business logic mappings
# Synced with Mixpanel database with Vietnamese event names
# VERSION: Synchronized with legacy_event_schema.yaml v9.0

metadata:
  schema_version: "1.0.0"
  format: "mixpanel_vietnamese_events"
  synced_with: "legacy_event_schema.yaml v9.0"
  last_sync: "2026-04-07"

templates:
  base_user: &base_user
    - User ID
    - discord_name
    - server_name
    - distinct_id
    - roles
    - is_bot

  base_channel: &base_channel
    - channel_id
    - channel_name
    - channel_type

  base_message: &base_message
    - message_id
    - message_type
    - character_count
    - attachment_count
    - has_attachments
    - has_embeds
    - embed_count
    - has_stickers
    - sticker_count
    - has_gif

  base_event: &base_event
    - $insert_id
    - $time
    - timestamp
    - vietnamese_event_name
    - luong
    - event_type
    - is_trackable
    - is_unidentified
    - server_id

  base_forum: &base_forum
    - parent_channel_id
    - parent_channel_name
    - parent_channel_type
    - thread_id
    - thread_name
    - category_id
    - category_name

  correlation: &correlation
    - correlation_type
    - correlation_confidence
    - correlation_delay_seconds
    - is_correlated
    - use_correlation
    - triggering_user_id
    - triggering_username
    - trigger_message_id
    - trigger_message_content

  sticker_details: &sticker_details
    - sticker_ids
    - sticker_names
    - sticker_count
    - has_custom_stickers

events:
  # LUỒNG 1: Onbroading server
  mod_message_update:
    name_pattern: "Mod cập nhật tin nhắn trong kênh {channel_name}"
    luong: "Onbroading server"
    required_properties:
      - *base_user
      - *base_channel
      - *base_event
      - mod_update
      - update_channel

  marketing_role_event:
    name: "vào mục ⭐️kiến-thức-marketing"
    luong: "Onbroading server"
    required_properties:
      - *base_user
      - *base_event
      - role_name
      - role_action
      - is_marketing_role
      - triggered_by_role_change

  # LUỒNG 2: Sử dụng tính năng chát chung
  general_chat_message:
    name: "Sử dụng chát chung"
    luong: "Sử dụng tính năng chát chung"
    required_properties:
      - *base_user
      - *base_channel
      - *base_message
      - *base_event
      - general_chat_interaction
      - interaction_type

  general_chat_gif:
    name: "Vào gif trong chát chung"
    luong: "Sử dụng tính năng chát chung"
    required_properties:
      - *base_user
      - *base_channel
      - *base_message
      - *base_event
      - general_chat_interaction

  general_chat_sticker:
    name: "Vào sticker trong chát chung"
    luong: "Sử dụng tính năng chát chung"
    required_properties:
      - *base_user
      - *base_channel
      - *base_message
      - *base_event
      - *sticker_details
      - general_chat_interaction

  general_chat_emoji:
    name: "Vào emojy trong chát chung"
    luong: "Sử dụng tính năng chát chung"
    required_properties:
      - *base_user
      - *base_channel
      - *base_event
      - reaction_emoji

  # LUỒNG 3: Xem loa phương
  announcement_follow:
    name: "Theo dõi loa phương"
    luong: "Xem loa phương"
    required_properties:
      - *base_user
      - *base_channel
      - *base_event
      - webhook_id
